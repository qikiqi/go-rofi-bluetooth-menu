name: Matrix Build Go Binaries
on:
  workflow_call:
permissions:
  contents: write
jobs:
  build-go:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { name: go-rofi-bluetooth-menu, runner: ubuntu-latest, os: linux, arch: amd64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
      - name: Build
        env:
          NAME: "${{ matrix.name }}"
          GOOS: "${{ matrix.os }}"
          GOARCH: "${{ matrix.arch }}"
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -buildvcs=true \
            -o dist/$NAME-$GOOS-$GOARCH
      - uses: go-semantic-release/action@v1
        id: semrel
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          custom-arguments: "--provider-opt github_use_compare_commits=true"
      - name: Upload binaries to release
        if: steps.semrel.outputs.version != ''
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/${{ matrix.name }}-${{ matrix.os }}-${{ matrix.arch }}
          asset_name: ${{ matrix.name }}-${{ matrix.os }}-${{ matrix.arch }}
          tag: "v${{ steps.semrel.outputs.version }}"
